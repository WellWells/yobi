name: Build & Draft Release

on:
  push:
    branches:
      - release
    tags:
      - 'v*'

# Requires write permission to create a Release
permissions:
  contents: write

# Force GitHub Actions to use Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Cross-platform Build
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_script: build:mac
            artifact_name: dist-mac
            artifact_path: |
              dist/*.dmg
              dist/*.yml

          - os: windows-latest
            build_script: build:win
            artifact_name: dist-win
            artifact_path: |
              dist/*.exe
              dist/*.yml

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js 24 + npm cache ──────────────────────────────────
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── Electron binaries cache (macOS) ────────────────────────────
      - name: Cache Electron binaries (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-macos-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-macos-

      # ── Electron binaries cache (Windows) ──────────────────────────
      - name: Cache Electron binaries (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.LOCALAPPDATA }}\electron\Cache
            ${{ env.LOCALAPPDATA }}\electron-builder\Cache
          key: electron-windows-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-windows-

      # ── Install dependencies ───────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Build + Package ────────────────────────────────────────────
      - name: Build
        run: npm run ${{ matrix.build_script }} -- --publish=never
        env:
          # Disable macOS automatic code signing identity discovery (no certificates in CI)
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload artifacts for the Release Job ──────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # 2. Gather artifacts and create a Draft Release
  # ─────────────────────────────────────────────────────────────
  release:
    name: Create Draft Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      # ── Get version from package.json ───────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # ── Resolve tag name and release title ──────────────────────────
      - name: Resolve release metadata
        id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
            echo "title=Desktop Agent Center $GITHUB_REF_NAME" >> $GITHUB_OUTPUT
          else
            echo "tag=v${{ steps.pkg.outputs.version }}-build.${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "title=Desktop Agent Center v${{ steps.pkg.outputs.version }} (Build #${{ github.run_number }})" >> $GITHUB_OUTPUT
          fi

      # ── Download artifacts from all platforms ───────────────────────
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      # ── Build download table ─────────────────────────────────────────
      - name: Build download table
        id: downloads
        run: |
          cd artifacts
          echo "table<<EOF" >> $GITHUB_OUTPUT
          echo "| Platform | Architecture | File |" >> $GITHUB_OUTPUT
          echo "|----------|-------------|------|" >> $GITHUB_OUTPUT
          for file in $(ls | sort); do
            if [[ "$file" == *.yml ]]; then continue; fi
            if [[ "$file" == *arm64*.dmg || "$file" == *aarch64*.dmg ]]; then
              echo "| macOS | 🍎 Apple Silicon (M1 / M2 / M3 / M4) | \`$file\` |" >> $GITHUB_OUTPUT
            elif [[ "$file" == *.dmg ]]; then
              echo "| macOS | 🖥️ Intel (x64) | \`$file\` |" >> $GITHUB_OUTPUT
            elif [[ "$file" == *.exe ]]; then
              echo "| Windows | x64 | \`$file\` |" >> $GITHUB_OUTPUT
            fi
          done
          echo "EOF" >> $GITHUB_OUTPUT

      # ── Create Draft Release ─────────────────────────────────────────
      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          body: |
            <!-- ✏️ Fill in each section below, then delete any that are empty before publishing. -->

            ## ✨ Added

            -

            ## 🔄 Changed

            -

            ## ⚠️ Deprecated

            -

            ## 🗑️ Removed

            -

            ## 🐛 Fixed

            -

            ## 🔒 Security

            -

            ---

            ## 📦 Downloads

            ${{ steps.downloads.outputs.table }}

            > **macOS — not sure which version?**
            > Check **Apple menu → About This Mac**.
            > - **Apple Silicon (M1/M2/M3/M4)** → download the `arm64` build
            > - **Intel** → download the `x64` build

            ---

            ## ⚠️ macOS: Unsigned App

            macOS Gatekeeper will block the first launch. After copying to `/Applications`:

            **Option 1 — Terminal (Recommended)**

            ```bash
            sudo xattr -rd com.apple.quarantine /Applications/DesktopAgentCenter.app
            ```

            **Option 2 — System Settings**

            Attempt to open the app (it will be blocked), then go to **System Settings → Privacy & Security → Open Anyway**.
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

